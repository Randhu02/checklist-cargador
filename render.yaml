services:
  - type: web
    name: checklist-cargador
    runtime: python
    buildCommand: |
      apt-get update
      apt-get install -y wkhtmltopdf
      pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 2 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0